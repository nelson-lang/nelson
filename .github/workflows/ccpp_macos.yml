name: "macOS Build"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  workflow_call:
    inputs:
      run_macos_tests:
        description: "Run macOS tests job"
        required: false
        type: boolean
        default: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Tahoe (26)
            runner: macos-26
            qt: false
            script: install-macOS.sh
            extra_config: ""
            arch: arm64
          - name: Sequoia (15)
            runner: macos-15
            qt: false
            script: install-macOS.sh
            extra_config: ""
            arch: arm64
          - name: Sequoia (15) intel
            runner: macos-15-intel
            qt: false
            script: install-macOS.sh
            extra_config: ""
            arch: x86_64
          - name: Sonoma (14)
            runner: macos-14
            qt: false
            script: install-macOS.sh
            extra_config: ""
            arch: arm64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.runner }}
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: $GITHUB_WORKSPACE/tools/install_dependencies/${{ matrix.config.script }}

      - name: Install Qt
        if: ${{ matrix.config.qt }}
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.4.2"

      - name: Get package version
        uses: jaywcjlove/github-action-package@v2.1.0
        id: json_version

      - name: Update version
        run: just update_version

      - name: Configure
        run: |
          export HDF5_DIR=$HOMEBREW_PREFIX/opt/hdf5
          just config "-DCMAKE_BUILD_TYPE=Release ${{ matrix.config.extra_config }} -G \"Unix Makefiles\" ."

      - name: Build
        run: just build

      - name: Get module skeleton
        run: just get_module_skeleton

      - name: Build help
        run: just build_help

      - name: Package
        run: just package

      - name: Install
        run: sudo just install

      - name: Setup Python environment for Nelson
        if: ${{ matrix.config.arch == 'arm64' }}
        run: just setup_python

      - name: Setup Julia environment for Nelson
        if: ${{ matrix.config.arch == 'arm64' }}
        run: just setup_julia

      - name: Benchmarks
        if: ${{ matrix.config.arch == 'arm64' }}
        run: just benchmarks

      - name: Tests
        run: just tests

      - name: Copy artifacts
        run: |
          mkdir artifacts
          mv tests_all*.* artifacts
          if [ "${{ matrix.config.arch }}" == "arm64" ]; then
            mv benchmark_all*.* artifacts
          fi
          mv Nelson-*.dmg artifacts

      - uses: actions/upload-artifact@v7
        with:
          name: nelson-github-action-artifacts-${{ matrix.config.name }}-${{ matrix.config.arch }}-${{ steps.json_version.outputs.version }}.${{ github.run_number }}
          path: artifacts/

  macos_tests:
    name: macOS Tests - ${{ matrix.config.name }}
    if: ${{ inputs.run_macos_tests }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Tahoe (26)
            runner: macos-26
            arch: arm64
          - name: Sequoia (15)
            runner: macos-15
            arch: arm64
          - name: Sequoia (15) intel
            runner: macos-15-intel
            arch: x86_64
          - name: Sonoma (14)
            runner: macos-14
            arch: arm64
    runs-on: ${{ matrix.config.runner }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - id: find_dmg
        name: Find DMG
        run: |
          DMG=$(find "$GITHUB_WORKSPACE/artifacts" -type f -name 'Nelson-*.dmg' -print -quit)
          if [ -z "$DMG" ]; then
            echo "No DMG found in $GITHUB_WORKSPACE/artifacts"
            ls -R "$GITHUB_WORKSPACE/artifacts" || true
            exit 1
          fi
          echo "dmg_path=$DMG" >> "$GITHUB_OUTPUT"
        shell: bash

      - id: mount_and_copy
        name: Mount DMG and copy
        run: |
          MOUNT_DIR=$(mktemp -d)
          hdiutil attach "${{ steps.find_dmg.outputs.dmg_path }}" -nobrowse -mountpoint "$MOUNT_DIR"
          INSTALL_DIR="$GITHUB_WORKSPACE/install/Nelson-${{ matrix.config.arch }}.${{ github.run_number }}"
          mkdir -p "$INSTALL_DIR"
          APP=$(find "$MOUNT_DIR" -maxdepth 2 -name '*.app' -print -quit)
          if [ -n "$APP" ]; then
            cp -R "$APP" "$INSTALL_DIR/"
            APP_BUNDLE=$(basename "$APP")
            CLI_PATH="$INSTALL_DIR/$APP_BUNDLE/Contents/MacOS/nelson-cli"
          else
            cp -R "$MOUNT_DIR"/* "$INSTALL_DIR/"
            CLI_PATH=$(find "$INSTALL_DIR" -type f -name 'nelson-cli' -print -quit)
          fi
          hdiutil detach "$MOUNT_DIR"
          echo "cli_path=$CLI_PATH" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Benchs
        run: |
          CLI="${{ steps.mount_and_copy.outputs.cli_path }}"
          if [ -z "$CLI" ] || [ ! -x "$CLI" ]; then
            echo "CLI not found or not executable: $CLI"
            exit 1
          fi
          export NELSON_TERM_IS_UNICODE_SUPPORTED=TRUE
          export TESTS_RESULT_DIR=$GITHUB_WORKSPACE/artifacts
          BENCH_SCRIPT=$(find "$GITHUB_WORKSPACE/install" -type f -name 'runbenchmark_all.m' -print -quit)
          if [ -n "$BENCH_SCRIPT" ]; then
            "$CLI" --noipc --quiet -f "$BENCH_SCRIPT"
          else
            echo "No bench script found"
          fi
        shell: bash

      - name: Tests
        run: |
          CLI="${{ steps.mount_and_copy.outputs.cli_path }}"
          export NELSON_TERM_IS_UNICODE_SUPPORTED=TRUE
          export TESTS_RESULT_DIR=$GITHUB_WORKSPACE/artifacts
          TEST_SCRIPT=$(find "$GITHUB_WORKSPACE/install" -type f -name 'runtests_all.m' -print -quit)
          if [ -n "$TEST_SCRIPT" ]; then
            "$CLI" --noipc --quiet -f "$TEST_SCRIPT"
          else
            echo "No test script found"
          fi
        shell: bash

      - uses: actions/upload-artifact@v7
        with:
          name: nelson-github-action-artifacts-${{ matrix.config.name }}-${{ matrix.config.arch }}.${{ github.run_number }}
          path: artifacts/

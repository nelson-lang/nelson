name: Minimal Build
concurrency:
  group: minimal-${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on: [push]

jobs:
  Jammy:
    name: Ubuntu 24.04
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: install dependencies
        run: sudo $GITHUB_WORKSPACE/tools/install_dependencies/install-ubuntu-24.04-minimal.sh

      - name: Get package version
        uses: jaywcjlove/github-action-package@v2.1.0
        id: json_version

      - name: Update version
        run: just update_version

      - name: Configure
        run: just config cmake -DCMAKE_BUILD_TYPE=Release -DMINIMAL_BUILD=ON -G "Ninja" .

      - name: Build
        run: just build

      - name: Package
        run: just package

      - name: Copy artifacts
        run: mkdir artifacts && mv nelson-*.deb artifacts

      - uses: actions/upload-artifact@v7
        with:
          name: nelson-github-action-artifacts-minimal-linux-ubuntu-24-04-amd64-${{steps.json_version.outputs.version}}.${{ github.sha }}
          path: artifacts/

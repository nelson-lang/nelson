[package]
name = "nelson-update-version"
version.workspace = true
edition = "2021"
description = "Version updater for the Nelson project"
license = "LGPL-3.0-or-later"
publish = false

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = "1"
serde_json = { version = "1", features = ["preserve_order"] }
walkdir = "2"
regex = "1"
anyhow = "1"
chrono = "0.4"

[dev-dependencies]
speculoos = "0.11"
tempfile = "3"

[package]
name = "nelson-fmt"
version.workspace = true
edition = "2021"
description = "Code formatter for the Nelson project"
license = "LGPL-3.0-or-later"
publish = false

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["preserve_order"] }
walkdir = "2"
anyhow = "1"
xmlformat = "1.2.1"
toml_edit = "*"
rayon = "1"

[dev-dependencies]
speculoos = "0.13"
tempfile = "3"
